# Zensical configuration for Ghost Brain docs.

[project]
site_name = "Ghost Brain"
site_url = "https://thewintershadow.github.io/GhostBrain"
site_description = "Voice-interviewer bot documentation"
site_author = "TheWinterShadow"
copyright = "Copyright &copy; 2026 TheWinterShadow &mdash; MIT License"
docs_dir = "docs"
site_dir = "site"

repo_name = "TheWinterShadow/GhostBrain"
repo_url = "https://github.com/TheWinterShadow/GhostBrain"
edit_uri = "edit/main/docs/"

nav = [
  { "🏠 Home" = "index.md" },
  { "🏗️ Architecture" = "architecture/index.md" },
  { "🧪 Local Testing" = "local-testing/index.md" },
  { "☁️ Self-Hosting" = [
    { "Setup Guide" = "self-hosting/index.md" },
    { "Customization" = [
      { "Overview" = "customization/index.md" },
      { "Adding Tools" = "customization/tools.md" },
      { "Switching STT" = "customization/stt.md" },
      { "Switching the Brain (LLM)" = "customization/llm.md" },
      { "Switching TTS" = "customization/tts.md" },
      { "Custom Context" = "customization/context.md" }
    ]}
  ]},
  { "📚 API Reference" = [
    { "Application" = "api/app.md" },
    { "Configuration" = "api/config.md" },
    { "Handlers" = [
      { "WebSocket" = "api/handlers/websocket.md" },
      { "Post-Call" = "api/handlers/post_call.md" }
    ]},
    { "Modules" = [
      { "AI" = [
        { "Context" = "api/modules/ai/context.md" },
        { "LLM" = "api/modules/ai/llm.md" },
        { "STT" = "api/modules/ai/stt.md" },
        { "TTS" = "api/modules/ai/tts.md" }
      ]},
      { "Pipeline" = [
        { "Pipeline" = "api/modules/pipeline/pipeline.md" },
        { "Runner" = "api/modules/pipeline/runner.md" },
        { "Debug" = "api/modules/pipeline/debug.md" }
      ]}
    ]},
    { "Transport" = [
      { "Twilio" = "api/transport/twilio.md" }
    ]},
    { "Utils" = [
      { "Transcript" = "api/utils/transcript.md" }
    ]}
  ]},
  { "⚙️ Infrastructure" = "infrastructure/index.md" }
]

# ── Markdown extensions ──────────────────────────────────────────────────────

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.betterem]
smart_enable = "all"

[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index     = "zensical.extensions.emoji.twemoji"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums     = true
line_spans          = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.pymdownx.tilde]

# ── Plugins (Ghost Brain Specific) ───────────────────────────────────────────

[project.plugins.search]
[project.plugins.autorefs]

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]
[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
show_source = false
show_root_heading = true
show_signature_annotations = true
show_if_no_docstring = true
members_order = "source"
show_bases = false

# ── Theme ────────────────────────────────────────────────────────────────────

[project.theme]
name = "material"
features = [
  # Instant SPA navigation
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "navigation.tracking",
  # Navigation layout
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.sections",
  "navigation.path",
  "navigation.indexes",
  "navigation.top",
  "navigation.footer",
  # Search
  "search.highlight",
  "search.share",
  "search.suggest",
  # Code blocks
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  # Tabs
  "content.tabs.link",
  # TOC
  "toc.follow",
]

[project.theme.icon]
logo = "fontawesome/solid/ghost"
repo = "fontawesome/brands/github"
edit = "lucide/pencil"
view = "lucide/eye"

# ── Color palettes (respects system preference) ──────────────────────────────

[[project.theme.palette]]
media       = "(prefers-color-scheme: light)"
scheme      = "default"
primary     = "indigo"
accent      = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media       = "(prefers-color-scheme: dark)"
scheme      = "slate"
primary     = "indigo"
accent      = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# ── Footer social links ───────────────────────────────────────────────────────

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/TheWinterShadow/GhostBrain"
name = "GitHub"
