# Build image and deploy to Cloud Run on push to main.
# Requires GCP credentials and Terraform/Cloud Run permissions.
# Secrets: GCP_SA_KEY, GCP_PROJECT_ID; optional GCP_REGISTRY_REGION (default us-central1).

name: Deploy

on:
  push:
    branches: [main]

env:
  REGION: us-central1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GAR
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGISTRY_REGION || 'us-central1' }}-docker.pkg.dev --quiet

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.GCP_REGISTRY_REGION || 'us-central1' }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ghost_brain/ghost_brain-bot
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      IMAGE_URI: ${{ secrets.GCP_REGISTRY_REGION || 'us-central1' }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ghost_brain/ghost_brain-bot:latest
      # Terraform Cloud Credentials
      TFC_WORKLOAD_IDENTITY_AUDIENCE: ${{ vars.TFC_WORKLOAD_IDENTITY_AUDIENCE }} # If using Dynamic
      TFC_AWS_RUN_ROLE_ARN: ${{ vars.TFC_AWS_RUN_ROLE_ARN }} # Not used here but standard for dynamic
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.0"
          # No cli_config_credentials_token needed for Service Principal environment variables

      - name: Terraform init
        working-directory: terraform
        run: terraform init
        env:
          # TFC Service Principal Credentials
          TFC_CLIENT_ID: ${{ secrets.TFC_CLIENT_ID }}
          TFC_CLIENT_SECRET: ${{ secrets.TFC_CLIENT_SECRET }}
          # Vars
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_cloud_run_image: ${{ env.IMAGE_URI }}

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply -auto-approve -input=false
        env:
          # TFC Service Principal Credentials
          TFC_CLIENT_ID: ${{ secrets.TFC_CLIENT_ID }}
          TFC_CLIENT_SECRET: ${{ secrets.TFC_CLIENT_SECRET }}
          # App Secrets
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_cloud_run_image: ${{ env.IMAGE_URI }}
          TF_VAR_groq_api_key: ${{ secrets.GROQ_API_KEY }}
          TF_VAR_deepgram_api_key: ${{ secrets.DEEPGRAM_API_KEY }}
          TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_twilio_account_sid: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TF_VAR_twilio_auth_token: ${{ secrets.TWILIO_AUTH_TOKEN }}
